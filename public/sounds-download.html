<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Sound Effects Download</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        h1 { text-align: center; margin: 20px 0; color: #e94560; }
        .download-all {
            text-align: center;
            margin: 20px 0 30px;
        }
        .download-all a {
            display: inline-block;
            background: #e94560;
            color: #fff;
            padding: 15px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .download-all a:hover { background: #c73650; }
        .download-all span { display: block; margin-top: 8px; color: #888; font-size: 14px; }
        .category { margin: 25px 0 10px; color: #e94560; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .sound-card {
            background: #16213e;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #0f3460;
        }
        .sound-card:hover { border-color: #e94560; }
        .sound-info { flex: 1; }
        .sound-name { font-weight: bold; font-size: 14px; }
        .sound-desc { color: #888; font-size: 12px; margin-top: 2px; }
        audio { width: 180px; height: 32px; }
        .dl-btn {
            background: #0f3460;
            color: #eee;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
        }
        .dl-btn:hover { background: #1a4a7a; }
        .count { text-align: center; color: #888; margin: 10px 0 20px; }
    </style>
</head>
<body>
    <h1>Game Sound Effects</h1>
    <p class="count">Total: 70 sound effects</p>

    <div class="download-all">
        <a href="/assets/sounds/all_sounds.zip" download>ZIP Download (All 70 Sounds)</a>
        <span>all_sounds.zip (612 KB)</span>
    </div>

    <h2 class="category">Combat</h2>
    <div class="grid" id="combat"></div>

            ],

        Object.entries(sounds).forEach(([category, list]) => {
            const container = document.getElementById(category);
            list.forEach(s => {
                const card = document.createElement("div");
                card.className = "sound-card";
                card.innerHTML = `
                    <div class="sound-info">
                        <div class="sound-name">${s.file}.mp3</div>
                        <div class="sound-desc">${s.desc}</div>
                    </div>
                    <audio controls preload="none" src="/assets/sounds/${s.file}.mp3"></audio>
                    <a class="dl-btn" href="/assets/sounds/${s.file}.mp3" download="${s.file}.mp3">DL</a>

                container.appendChild(card);

    </script>
</body>
</html>
